<!DOCTYPE html>
<html lang="en">

<!--
  =============================================
  index.html — Union Tailors Order Manager
  =============================================

  PURPOSE:
    This is the SKELETON of the app.
    It only contains the HTML structure.
    It does NOT contain any styling or logic.

  HOW IT CONNECTS TO OTHER FILES:
    - <link> tag loads css/style.css   → makes it look good
    - <script> tag loads js/app.js     → makes it work

  HOW THE APP RENDERS:
    JavaScript fills the <div id="app"> with HTML dynamically.
    When you click a button, JS replaces the content of #app
    with a different screen (login, order list, form, etc.)
    This is called a Single Page Application (SPA).
-->

<head>
  <meta charset="UTF-8" />

  <!-- Makes the app look correct on mobile phones -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

  <!-- Allows "Add to Home Screen" on Android/iOS -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Union Tailors" />

  <!-- Sets the browser address bar color to dark red on Android -->
  <meta name="theme-color" content="#8B1A1A" />

  <title>Union Tailors</title>
  <link rel="icon" type="image/png" href="/logo.png"/>
  <!-- LINK 1: Load all our CSS styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!--
    This single div is our entire app container.
    JavaScript will fill this with different screens.
    Think of it like a TV — the screen changes but the TV stays.
  -->
  <div id="app">

    <!-- This shows while JavaScript is loading -->
    <div class="loading-screen">
      <div class="spinner"></div>
      <p>Loading Union Tailors...</p>
    </div>

  </div>

  <!--
    LINK 2: Load our main JavaScript file.

    type="module" is important — it allows us to use
    import / export between our JS files.
    Without this, files cannot share code with each other.

    This MUST be at the bottom of <body> so the HTML
    above loads first before JavaScript runs.
  -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
